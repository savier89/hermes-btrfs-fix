name: Validate Patch

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check patch file exists
        run: |
          test -f btrfs-sqlite-fix.patch || { echo "Patch file missing"; exit 1; }
          echo "Patch file: OK"

      - name: Validate patch format
        run: |
          grep -q "^diff --git" btrfs-sqlite-fix.patch || { echo "Invalid patch format"; exit 1; }
          grep -q "^--- a/hermes_state.py" btrfs-sqlite-fix.patch || { echo "Missing hermes_state.py"; exit 1; }
          grep -q "^--- a/tools/terminal_tool.py" btrfs-sqlite-fix.patch || { echo "Missing terminal_tool.py"; exit 1; }
          echo "Patch format: OK"

      - name: Check for secrets leakage
        run: |
          if grep -iE '(token|password|secret|api_key|private_key).*=.*["\x27][^"\x27]+' btrfs-sqlite-fix.patch; then
            echo "ERROR: Possible secret leakage detected"
            exit 1
          fi
          echo "No secrets detected: OK"

      - name: Check script syntax
        run: |
          bash -n apply-btrfs-fix.sh && echo "Script syntax: OK"

      - name: Check README
        run: |
          test -f README.md || { echo "README missing"; exit 1; }
          grep -q "database is locked" README.md || { echo "README should mention actual error"; exit 1; }
          echo "README: OK"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare test environment
        run: |
          mkdir -p test_env/tools
          curl -sL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/hermes_state.py -o test_env/hermes_state.py
          curl -sL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/tools/terminal_tool.py -o test_env/tools/terminal_tool.py
          touch test_env/__init__.py test_env/tools/__init__.py
          cd test_env && patch -p1 < ../btrfs-sqlite-fix.patch || true
          echo "Test environment ready"

      - name: Run tests
        working-directory: .
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/test_env"
          python test_btrfs_fix.py
